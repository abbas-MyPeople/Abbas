name: Stocks · market snapshot (SPY)

# Commits a fresh SPY quote + options chain snapshot during US market hours.
# Frontend reads the committed JSON, so this keeps the dashboard near-real-time
# without exposing any keys in the browser.

on:
  workflow_dispatch:
  schedule:
    # Every 5 min, 13:30–20:00 UTC (≈ 9:30–16:00 ET), weekdays. GitHub cron
    # has jitter, so effective cadence is ~5–10 min; the pages poll the
    # committed JSON every 60s and patch in place, so updates land silently.
    - cron: '30-55/5 13 * * 1-5'
    - cron: '*/5 14-19 * * 1-5'
    - cron: '0,5 20 * * 1-5'

permissions:
  contents: write

concurrency:
  group: stocks-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch SPY market snapshot
        run: python stocks/scripts/fetch_market.py
      - name: Commit if changed
        run: |
          git config user.name  "stocks-bot"
          git config user.email "stocks-bot@users.noreply.github.com"
          git add stocks/data/spy/quote/latest.json stocks/data/spy/options/latest.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(stocks): SPY market snapshot [skip ci]"
            git push
          fi
