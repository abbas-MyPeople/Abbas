name: agent-status
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Poll voice-agent health and write status
        run: |
          set -e
          h=$(curl -fsS --max-time 20 https://wok-voice.fly.dev/health || echo '{}')
          ok=$(echo "$h" | jq -r '.ok // false')
          items=$(echo "$h" | jq -r '.menu_items // 0')
          errs=$(echo "$h" | jq -r '.errors // "?"')
          ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p data
          jq -n --argjson ok "$ok" --argjson items "$items" --arg errs "$errs" --arg ts "$ts" \
            '{ok:$ok, menu_items:$items, errors:$errs, checked_at:$ts}' > data/agent-status.json
      - name: Commit if changed
        run: |
          git config user.name "az-status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/agent-status.json
          git diff --cached --quiet || (git commit -m "status: agent health snapshot [skip ci]" && git push)
