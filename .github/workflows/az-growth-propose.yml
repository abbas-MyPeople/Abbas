name: AZ Growth Engine — daily sense + propose + send

# The AZ Restaurant Partners growth engine (growth_engine/ python package).
# Each morning it SENSEs context (GA4 + signals), PROPOSEs the day's growth moves,
# and SENDs the proposal email to the owner. Any updated engine state is committed
# back to main so the next run has full history.
#
# NOTE: scheduled + manual only. It must NOT trigger on push (it writes to
# growth_engine/state/**, which would self-trigger a loop).

on:
  schedule:
    - cron: "13 12 * * *"    # 12:13 UTC (~7:13 AM US Central)
  workflow_dispatch:

concurrency:
  group: az-growth
  cancel-in-progress: false

permissions:
  contents: write            # to commit accumulated engine state back to the repo

env:
  GA4_PROPERTY_ID:        ${{ secrets.GA4_PROPERTY_ID }}
  GA4_SA_JSON:            ${{ secrets.GA4_SA_JSON }}
  GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
  ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
  WK_ENGINE_EMAIL:        ${{ secrets.WK_ENGINE_EMAIL }}
  WK_ENGINE_APP_PASSWORD: ${{ secrets.WK_ENGINE_APP_PASSWORD }}
  WK_ENGINE_TO:           ${{ secrets.WK_ENGINE_TO }}

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r growth_engine/requirements.txt

      - name: Guard — required secrets must be present
        run: |
          set -euo pipefail
          missing=""
          for name in GA4_PROPERTY_ID GA4_SA_JSON GROQ_API_KEY ANTHROPIC_API_KEY \
                      WK_ENGINE_EMAIL WK_ENGINE_APP_PASSWORD WK_ENGINE_TO; do
            if [ -z "${!name:-}" ]; then
              missing="${missing} ${name}"
            fi
          done
          if [ -n "${missing}" ]; then
            echo "::error::Missing required secret(s):${missing}. Set them under Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "All required secrets present."

      - name: SENSE — gather context
        run: python -m growth_engine.run --mode sense

      - name: PROPOSE — draft the day's growth moves
        run: python -m growth_engine.run --mode propose

      - name: SEND — email the proposal to the owner
        run: python -m growth_engine.run --mode send

      - name: Commit accumulated state
        if: always()             # record the run even if a later step failed
        run: |
          git config user.name  "growth-engine[bot]"
          git config user.email "growth-engine@users.noreply.github.com"
          git add growth_engine/state/
          if git diff --cached --quiet; then
            echo "No state change."
          else
            git commit -m "growth-engine: daily sense+propose+send snapshot [skip ci]"
            git pull --rebase --autostash origin main || true
            git push origin main || echo "push skipped"
          fi
