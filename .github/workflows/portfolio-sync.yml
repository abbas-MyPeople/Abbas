name: Portfolio Sync — refresh command center git facts

# Refreshes command/portfolio.json with the LATEST git facts (ahead/behind, last commit, open PRs)
# for both repos, then commits it so the command center (command/index.html) shows current data.
# Run it from the Actions tab ("Run workflow") — that's what the dashboard's "Run full sync" button links to.
# The curated narrative/overlap fields are the AI audit and are refreshed separately (re-run the audit).
#
# OWNER SETUP (one-time, for cross-repo facts): add a fine-grained PAT secret `PORTFOLIO_PAT` with
# READ access to BOTH abbas-MyPeople/Abbas and abbas-MyPeople/WokAndKarahiTexas.com. Without it, only
# this repo's (AZ) facts refresh.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1'      # Mondays 12:00 UTC

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Refresh git facts
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_PAT || secrets.GITHUB_TOKEN }}
        run: python scripts/portfolio-sync.py
      - name: Commit refreshed portfolio.json
        run: |
          git config user.name  "portfolio-sync[bot]"
          git config user.email "portfolio-sync@users.noreply.github.com"
          git add command/portfolio.json
          if git diff --cached --quiet; then
            echo "No change."
          else
            git commit -m "portfolio-sync: refresh git facts [skip ci]"
            git push origin HEAD:main || echo "push skipped"
          fi
