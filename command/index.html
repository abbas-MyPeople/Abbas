<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>AZ Command Center — Portfolio & Product Ops</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2430; --line:#2a3441; --ink:#e6edf3; --dim:#9aa7b4; --dim2:#6e7d8c;
    --acc:#c9a227; --green:#3fb950; --amber:#d29922; --red:#f85149; --blue:#58a6ff; --sev:#db6d28;
    --r:12px; font-synthesis:none;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--blue);text-decoration:none}
  .wrap{max-width:1240px;margin:0 auto;padding:20px}
  /* gate */
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:14px}
  #gate h1{font-size:17px;font-weight:600;letter-spacing:.2px}
  #gate input{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:11px 14px;border-radius:10px;width:260px;font-size:15px}
  #gate .sub{color:var(--dim2);font-size:12px}
  #gate .err{color:var(--red);font-size:12px;min-height:14px}
  /* header */
  header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:16px}
  .brand{font-size:19px;font-weight:700;letter-spacing:-.2px}
  .brand span{color:var(--acc)}
  .tag{color:var(--dim);font-size:12.5px;margin-top:4px;max-width:640px}
  .sync{display:flex;gap:8px;align-items:center}
  button{cursor:pointer;font:inherit}
  .btn{background:var(--acc);color:#1a1400;border:0;padding:9px 15px;border-radius:9px;font-weight:650}
  .btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line)}
  .btn.ghost:hover{color:var(--ink);border-color:var(--dim2)}
  .synced{color:var(--dim2);font-size:11.5px;text-align:right}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:18px 0}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px}
  .kpi .n{font-size:22px;font-weight:700;line-height:1}
  .kpi .l{color:var(--dim);font-size:11.5px;margin-top:5px;text-transform:uppercase;letter-spacing:.4px}
  .kpi.warn .n{color:var(--sev)}
  /* toolbar */
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0 16px}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{background:transparent;color:var(--dim);border:0;padding:8px 13px;font-size:13px}
  .seg button.on{background:var(--panel2);color:var(--ink)}
  .toolbar input[type=search]{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 12px;border-radius:9px;min-width:180px;flex:1;max-width:280px}
  .filter{margin-left:auto;color:var(--dim2);font-size:12px}
  /* cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px;cursor:pointer;transition:.12s;position:relative}
  .card:hover{border-color:var(--dim2);transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .card h3{margin:0;font-size:15.5px;font-weight:650}
  .repo{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:20px;text-transform:uppercase}
  .repo.wok{background:rgba(201,162,39,.15);color:var(--acc)}
  .repo.az{background:rgba(88,166,255,.15);color:var(--blue)}
  .role{color:var(--dim);font-size:12.5px;margin:9px 0 12px;min-height:52px}
  .pill{font-size:10.5px;font-weight:650;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .st-live{background:rgba(63,185,80,.15);color:var(--green)}
  .st-live-partial{background:rgba(63,185,80,.12);color:#7ee787}
  .st-built-not-deployed{background:rgba(219,109,40,.16);color:var(--sev)}
  .st-in-build{background:rgba(210,153,34,.15);color:var(--amber)}
  .st-stale{background:rgba(110,125,140,.18);color:var(--dim)}
  .st-reference,.st-planning{background:rgba(88,166,255,.12);color:var(--blue)}
  .bar{height:6px;background:var(--panel2);border-radius:6px;overflow:hidden;margin:11px 0 8px}
  .bar > i{display:block;height:100%;border-radius:6px}
  .meta{display:flex;gap:12px;color:var(--dim2);font-size:11.5px;flex-wrap:wrap}
  .meta b{color:var(--dim)}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .h-green{background:var(--green)} .h-amber{background:var(--amber)} .h-red{background:var(--red)}
  .sev-badge{position:absolute;top:13px;right:13px}
  /* board */
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;align-items:start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:11px}
  .col h4{margin:2px 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim)}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:8px;cursor:pointer;font-size:13px}
  .chip:hover{border-color:var(--dim2)}
  .chip .cr{display:flex;justify-content:space-between;color:var(--dim2);font-size:11px;margin-top:4px}
  /* convergence */
  .conv h2{font-size:15px;margin:4px 0 12px}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .sev-severe{color:var(--red);font-weight:650} .sev-moderate{color:var(--amber)} .sev-low,.sev-none{color:var(--dim2)} .sev-opportunity{color:var(--green)}
  ol.seq{margin:16px 0 0;padding-left:20px} ol.seq li{margin:7px 0;color:var(--dim)}
  .spine{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-top:16px;font-size:12.5px;color:var(--dim)}
  .spine b{color:var(--ink)}
  /* modal */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:40;padding:24px;overflow:auto}
  #modal.on{display:block}
  .sheet{max-width:760px;margin:20px auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px}
  .sheet .x{float:right;background:transparent;border:0;color:var(--dim);font-size:22px;line-height:1}
  .sheet h2{margin:0 0 3px;font-size:19px}
  .sheet .sub{color:var(--dim);font-size:12.5px;margin-bottom:14px}
  .sec{margin-top:16px}
  .sec h5{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim2)}
  .comp{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px}
  .comp .cb{flex:1;height:6px;background:var(--panel2);border-radius:6px;overflow:hidden}
  .comp .cb i{display:block;height:100%}
  ul.list{margin:0;padding-left:18px} ul.list li{margin:5px 0;color:var(--dim)}
  .ov{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin:6px 0;font-size:12.5px}
  .ov .w{color:var(--ink);font-weight:600}
  .kv{color:var(--dim);font-size:12px} .kv b{color:var(--ink)}
  @media(max-width:600px){.role{min-height:auto}}
</style>
</head>
<body>

<div id="gate">
  <div class="brand">AZ <span>Command Center</span></div>
  <input id="pw" type="password" placeholder="Passcode" autocomplete="off" autofocus>
  <div class="err" id="gateErr"></div>
  <div class="sub">Internal — portfolio &amp; product ops across both repos.</div>
</div>

<div class="wrap" id="app" hidden>
  <header>
    <div>
      <div class="brand">AZ <span>Command Center</span></div>
      <div class="tag" id="thesis"></div>
    </div>
    <div>
      <div class="sync">
        <button class="btn" id="syncBtn">↻ Sync latest</button>
        <a class="btn ghost" id="fullSync" target="_blank" rel="noopener">Run full sync ↗</a>
      </div>
      <div class="synced" id="syncedAt"></div>
    </div>
  </header>

  <div class="kpis" id="kpis"></div>

  <div class="toolbar">
    <div class="seg" id="views">
      <button data-v="cards" class="on">Cards</button>
      <button data-v="board">Status board</button>
      <button data-v="conv">Convergence</button>
    </div>
    <div class="seg" id="repos">
      <button data-r="all" class="on">All</button>
      <button data-r="wok">Wok &amp; Karahi</button>
      <button data-r="az">AZ</button>
    </div>
    <input type="search" id="q" placeholder="Search projects…">
    <span class="filter" id="count"></span>
  </div>

  <div id="cards" class="grid"></div>
  <div id="board" class="board" hidden></div>
  <div id="conv" class="conv" hidden></div>
</div>

<div id="modal"><div class="sheet" id="sheet"></div></div>

<script>
const STATUS_LABEL={ "live":"Live","live-partial":"Live (partial)","built-not-deployed":"Built · not deployed","in-build":"In build","stale":"Stale","reference":"Reference","planning":"Planned" };
const BOARD_ORDER=[["live","Live"],["live-partial","Live (partial)"],["built-not-deployed","Built · not deployed"],["in-build","In build"],["stale","Stale / reference"]];
const HEALTH_COLOR={green:"var(--green)",amber:"var(--amber)",red:"var(--red)"};
const AZ_ACTIONS="https://github.com/abbas-MyPeople/Abbas/actions/workflows/portfolio-sync.yml";
let DATA=null, VIEW="cards", REPO="all", Q="";

function pctColor(p){ return p>=85?"var(--green)":p>=55?"var(--amber)":"var(--sev)"; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

async function load(bust){
  const r = await fetch("portfolio.json"+(bust?("?t="+Date.now()):""));
  DATA = await r.json();
  document.getElementById("thesis").textContent = DATA.summary.thesis;
  document.getElementById("fullSync").href = AZ_ACTIONS;
  document.getElementById("syncedAt").innerHTML =
    "data synced "+esc(DATA.meta.last_git_sync)+" · viewed "+new Date().toLocaleString();
  renderKpis(); render();
}
function projects(){
  return DATA.projects.filter(p=>(REPO==="all"||p.repo===REPO) &&
    (!Q || (p.name+" "+p.role+" "+p.location).toLowerCase().includes(Q)));
}
function renderKpis(){
  const P=DATA.projects;
  const n=(f)=>P.filter(f).length;
  const blockers=P.reduce((a,p)=>a+(p.blockers?.length||0),0);
  const manual=P.reduce((a,p)=>a+(p.manual_steps?.length||0),0);
  const dup=DATA.convergence.duplications.length;
  const k=[
    ["Projects",P.length,0],["Live",n(p=>p.status.startsWith("live")),0],
    ["Built · not live",n(p=>p.status==="built-not-deployed"),1],
    ["In build",n(p=>p.status==="in-build"),0],
    ["Duplications",dup,1],["Blockers",blockers,1],["Owner actions",manual,1]
  ];
  document.getElementById("kpis").innerHTML = k.map(([l,v,w])=>
    `<div class="kpi ${w?'warn':''}"><div class="n">${v}</div><div class="l">${l}</div></div>`).join("");
}
function card(p){
  const ov=(p.overlaps||[]).filter(o=>o.severity!=="none"&&o.severity!=="opportunity").length;
  return `<div class="card" data-id="${p.id}">
    ${ov?`<span class="pill sev-badge st-built-not-deployed">${ov} overlap${ov>1?'s':''}</span>`:''}
    <div class="top"><h3><span class="dot h-${p.health}"></span>${esc(p.name)}</h3>
      <span class="repo ${p.repo}">${p.repo}</span></div>
    <div class="role">${esc(p.role)}</div>
    <span class="pill st-${p.status}">${STATUS_LABEL[p.status]||p.status}</span>
    <div class="bar"><i style="width:${p.percent}%;background:${pctColor(p.percent)}"></i></div>
    <div class="meta"><span><b>${p.percent}%</b></span>
      <span>${esc(p.location)}</span>
      ${p.blockers?.length?`<span>🚧 ${p.blockers.length}</span>`:''}
      ${p.manual_steps?.length?`<span>👤 ${p.manual_steps.length}</span>`:''}</div>
  </div>`;
}
function renderCards(){ document.getElementById("cards").innerHTML = projects().map(card).join(""); }
function renderBoard(){
  const P=projects();
  document.getElementById("board").innerHTML = BOARD_ORDER.map(([st,lbl])=>{
    const items=P.filter(p=> st==="stale" ? ["stale","reference","planning"].includes(p.status) : p.status===st);
    if(!items.length) return "";
    return `<div class="col"><h4>${lbl} · ${items.length}</h4>${items.map(p=>`
      <div class="chip" data-id="${p.id}"><span class="dot h-${p.health}"></span>${esc(p.name)}
      <div class="cr"><span class="repo ${p.repo}">${p.repo}</span><span>${p.percent}%</span></div></div>`).join("")}</div>`;
  }).join("");
}
function renderConv(){
  const c=DATA.convergence;
  document.getElementById("conv").innerHTML = `
    <h2>Duplication to converge — the repetition, mapped</h2>
    <table><thead><tr><th>What</th><th>Copies</th><th>Converge onto</th><th>Severity</th><th>Why it matters</th></tr></thead>
    <tbody>${c.duplications.map(d=>`<tr><td><b>${esc(d.what)}</b></td><td>${esc(d.copies)}</td>
      <td>${esc(d.converge_to)}</td><td class="sev-${d.severity}">${d.severity}</td><td class="kv">${esc(d.why)}</td></tr>`).join("")}</tbody></table>
    <div class="spine"><b>The spine (one of each):</b> ${DATA.summary.spine.map(esc).join(" &nbsp;·&nbsp; ")}<br>
      <b>Faucets on top:</b> ${DATA.summary.faucets.map(esc).join(" · ")}</div>
    <h2 style="margin-top:22px">Recommended sequence — converge, then replicate</h2>
    <ol class="seq">${c.sequence.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>`;
}
function render(){
  for(const v of ["cards","board","conv"]) document.getElementById(v).hidden = (v!==VIEW);
  if(VIEW==="cards") renderCards(); else if(VIEW==="board") renderBoard(); else renderConv();
  document.getElementById("count").textContent = VIEW==="conv"?"":projects().length+" shown";
}
function openModal(id){
  const p=DATA.projects.find(x=>x.id===id); if(!p) return;
  const g=p.git||{};
  const comps=(p.components||[]).map(c=>`<div class="comp"><div class="cb"><i style="width:${c.pct}%;background:${pctColor(c.pct)}"></i></div>
    <span style="min-width:52px">${c.pct}%</span><span>${esc(c.name)}</span>
    <span class="pill st-${c.status==='live'?'live':c.status==='retire'?'stale':c.status==='planning'?'planning':'built-not-deployed'}" style="margin-left:auto">${esc(c.status)}</span></div>`).join("");
  const overlaps=(p.overlaps||[]).map(o=>`<div class="ov"><span class="w">↔ ${esc(o.with)}</span> <span class="sev-${o.severity}">[${o.severity}]</span><br>${esc(o.what)}</div>`).join("")||'<div class="kv">None.</div>';
  const li=(arr)=>arr&&arr.length?`<ul class="list">${arr.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:'<div class="kv">—</div>';
  document.getElementById("sheet").innerHTML = `
    <button class="x" onclick="closeModal()">×</button>
    <h2><span class="dot h-${p.health}"></span>${esc(p.name)} <span class="repo ${p.repo}">${p.repo}</span></h2>
    <div class="sub">${esc(p.location)} · branch <b>${esc(p.branch)}</b> · <span class="pill st-${p.status}">${STATUS_LABEL[p.status]||p.status}</span> · ${p.percent}%</div>
    <div class="sec"><h5>Role in the business</h5><div>${esc(p.role)}</div></div>
    <div class="sec"><h5>Stage</h5><div class="kv">${esc(p.stage)}</div></div>
    <div class="sec"><h5>Components</h5>${comps||'<div class="kv">—</div>'}</div>
    <div class="sec"><h5>Blockers</h5>${li(p.blockers)}</div>
    <div class="sec"><h5>Owner manual steps</h5>${li(p.manual_steps)}</div>
    <div class="sec"><h5>Overlaps / duplication</h5>${overlaps}</div>
    <div class="sec"><h5>Next steps</h5>${li(p.next)}</div>
    <div class="sec"><h5>AZ product mapping</h5><div class="kv">${esc(p.az_offering)}</div></div>
    <div class="sec"><h5>Git</h5><div class="kv">ahead <b>${g.ahead??'?'}</b> · behind <b>${g.behind??'?'}</b> · last commit <b>${esc(g.last_commit||'?')}</b> · open PRs <b>${g.open_prs??'?'}</b></div></div>`;
  document.getElementById("modal").classList.add("on");
}
function closeModal(){ document.getElementById("modal").classList.remove("on"); }

document.addEventListener("click",e=>{
  const c=e.target.closest("[data-id]"); if(c){ openModal(c.dataset.id); return; }
  if(e.target.id==="modal") closeModal();
});
document.querySelectorAll("#views button").forEach(b=>b.onclick=()=>{
  VIEW=b.dataset.v; document.querySelectorAll("#views button").forEach(x=>x.classList.toggle("on",x===b)); render();});
document.querySelectorAll("#repos button").forEach(b=>b.onclick=()=>{
  REPO=b.dataset.r; document.querySelectorAll("#repos button").forEach(x=>x.classList.toggle("on",x===b)); render();});
document.getElementById("q").oninput=e=>{ Q=e.target.value.toLowerCase().trim(); render(); };
document.getElementById("syncBtn").onclick=async e=>{
  e.target.textContent="↻ Syncing…"; await load(true); e.target.textContent="↻ Sync latest";
};
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

// light gate (matches the repo's robots-disallow bar for internal content; sensitive $/PII kept out of the data)
const EXPECT="YXpycC1jb21tYW5k"; // atob -> the passcode
function unlock(){ document.getElementById("gate").remove(); const a=document.getElementById("app"); a.hidden=false; sessionStorage.setItem("azc","1"); load(false); }
document.getElementById("pw").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  if(e.target.value===atob(EXPECT)) unlock();
  else { document.getElementById("gateErr").textContent="Nope."; e.target.value=""; }
});
if(sessionStorage.getItem("azc")==="1") unlock();
</script>
</body>
</html>
